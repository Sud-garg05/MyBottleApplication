<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B7FFF1"/>
      <stop offset="50%" stop-color="#58FFD4"/>
      <stop offset="100%" stop-color="#00E0B8"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Circle for contrast on all themes -->
  <circle cx="512" cy="512" r="480" fill="#0b0b0e" stroke="#1e293b" stroke-width="12" />

